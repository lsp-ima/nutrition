<!-- ===== ログイン画面 ===== -->
<div id="loginScreen" class="glass-panel" style="max-width:430px;">
  <div class="content active" style="display:block;">
    <h2>パーソナル栄養アドバイザー</h2>
    <p class="sub">あなた専用の合言葉でログインすると、プロフィール・体重・相談履歴が記録され、あなたに合わせた回答になります。</p>
    <label>あなたの合言葉</label>
    <input type="text" id="loginPass" placeholder="購入時にお渡しした合言葉" autocomplete="off">
    <button class="action-btn" onclick="doLogin()">ログイン / はじめる</button>
    <div id="loginMsg" class="err"></div>
    <p class="fine">※合言葉は他人に教えないでください。健康・体重の情報を扱います。</p>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app" class="glass-panel" style="display:none;">
  <div class="topbar">
    <span id="greet">ようこそ</span>
    <button class="logout" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tab-container">
    <button class="tab active" data-tab="ai" onclick="openTab(event,'ai')">AIに相談</button>
    <button class="tab" data-tab="analysis" onclick="openTab(event,'analysis')">体重を記録</button>
    <button class="tab" data-tab="profile" onclick="openTab(event,'profile')">プロフィール</button>
    <button class="tab" data-tab="record" onclick="openTab(event,'record')">記録</button>
  </div>

  <div id="ai" class="content active">
    <div id="personalTip" class="ptip"></div>
    <h2>あなたに合わせて回答します</h2>
    <label>体の悩みや、栄養について聞きたいこと</label>
    <textarea id="customQuestion" rows="4" placeholder="例: 食欲が止まらない。脂肪燃焼におすすめのサプリは？更年期でお腹周りが気になる。"></textarea>
    <button class="action-btn" onclick="askPseudoAI()">質問する</button>
    <div id="questionResult" class="result"></div>
  </div>

  <div id="analysis" class="content">
    <h2>夜と朝の体重を記録・分析</h2>
    <label>夜の体重 (kg)</label>
    <input type="number" step="0.1" id="nightWeight" placeholder="例: 70.5">
    <label>朝の体重 (kg)</label>
    <input type="number" step="0.1" id="morningWeight" placeholder="例: 70.2">
    <button class="action-btn" onclick="analyze()">記録して分析</button>
    <div id="analysisResult" class="result"></div>
  </div>

  <div id="profile" class="content">
    <h2>プロフィール（回答の個別化に使います）</h2>
    <label>ニックネーム</label>
    <input type="text" id="pfNick" placeholder="例: あや">
    <label>性別</label>
    <select id="pfSex"><option>女性</option><option>男性</option><option>その他・未回答</option></select>
    <label>年代</label>
    <select id="pfAge"><option>10代</option><option>20代</option><option>30代</option><option>40代</option><option>50代</option><option>60代以上</option></select>
    <label>目標</label>
    <select id="pfGoal"><option>減量したい</option><option>引き締め・筋肉維持</option><option>健康維持</option></select>
    <label>当てはまるもの（複数選択可）</label>
    <div id="pfFlags" class="chips"></div>
    <label>その他メモ（アレルギー・持病など）</label>
    <textarea id="pfNotes" rows="2" placeholder="例: 乳製品が苦手 / 貧血ぎみ"></textarea>
    <button class="action-btn" onclick="saveProfile()">保存する</button>
    <div id="profileMsg" class="ok-msg"></div>
  </div>

  <div id="record" class="content">
    <h2>あなたの記録</h2>
    <div id="tipPanel" class="ptip"></div>
    <h3>体重の推移（直近）</h3>
    <div id="weightTrend" class="trend"></div>
    <h3>最近の相談</h3>
    <div id="histList" class="histlist"></div>
  </div>
</div>

// ================= ユーティリティ =================
function safeLSget(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function safeLSset(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
function safeLSdel(k){ try{localStorage.removeItem(k);}catch(e){} }
function escp(s){ return (s||'').toString().replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

// ================= 認証・データ =================
async function doLogin(){
  const v = document.getElementById('loginPass').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!v){ msg.textContent='合言葉を入力してください'; return; }
  if(!sb){ msg.textContent='通信の初期化に失敗しました。時間をおいて再度お試しください。'; return; }
  msg.textContent='読み込み中...';
  try{
    const { data, error } = await sb.rpc('na_load', { p: v });
    if(error) throw error;
    // 登録済みの合言葉だけログインを許可（未登録・停止中は入れない）
    if(!data || !data.registered){
      msg.textContent='この合言葉は登録されていません。購入時にお渡しした合言葉をご確認ください。';
      return;
    }
    PASS = v; safeLSset('na_pass', v);
    PROFILE = data.profile || {};
    LOGS    = data.logs || [];
    HISTORY = data.history || [];
    const isNew = !(PROFILE && PROFILE.nick);
    enterApp(isNew);
  }catch(e){
    console.error(e);
    msg.textContent='ログインできませんでした。データベース設定(na_schema.sql)が未適用の可能性があります。';
  }
}

function doLogout(){ safeLSdel('na_pass'); location.reload(); }

function enterApp(isNew){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  buildFlagChips();
  fillProfileForm();
  renderGreet();
  renderRecord();
  renderPersonalTip();
  if(isNew || !PROFILE || !PROFILE.nick){ openTabByName('profile'); }
}

// ================= プロフィール =================
function buildFlagChips(){
  const box=document.getElementById('pfFlags'); box.innerHTML='';
  FLAG_OPTIONS.forEach(function(f){
    const wrap=document.createElement('label'); wrap.className='chip';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.value=f;
    wrap.appendChild(cb); wrap.appendChild(document.createTextNode(' '+f));
    box.appendChild(wrap);
  });
}
function fillProfileForm(){
  document.getElementById('pfNick').value=(PROFILE&&PROFILE.nick)||'';
  if(PROFILE&&PROFILE.sex) document.getElementById('pfSex').value=PROFILE.sex;
  if(PROFILE&&PROFILE.age) document.getElementById('pfAge').value=PROFILE.age;
  if(PROFILE&&PROFILE.goal) document.getElementById('pfGoal').value=PROFILE.goal;
  document.getElementById('pfNotes').value=(PROFILE&&PROFILE.notes)||'';
  const flags=(PROFILE&&PROFILE.flags)||[];
  document.querySelectorAll('#pfFlags input').forEach(function(cb){ cb.checked=flags.indexOf(cb.value)>=0; });
}
async function saveProfile(){
  const flags=[]; document.querySelectorAll('#pfFlags input').forEach(function(cb){ if(cb.checked) flags.push(cb.value); });
  PROFILE={ nick:document.getElementById('pfNick').value.trim(), sex:document.getElementById('pfSex').value,
    age:document.getElementById('pfAge').value, goal:document.getElementById('pfGoal').value,
    flags:flags, notes:document.getElementById('pfNotes').value.trim() };
  const msg=document.getElementById('profileMsg'); msg.textContent='保存中...';
  if(PASS && sb){
    try{ const { error } = await sb.rpc('na_save_profile',{p:PASS,prof:PROFILE}); if(error) throw error; msg.textContent='保存しました ✅'; }
    catch(e){ console.error(e); msg.textContent='保存に失敗しました'; }
  }
  renderGreet(); renderPersonalTip();
}
function renderGreet(){
  const n=(PROFILE&&PROFILE.nick)?(PROFILE.nick+'さん'):'ようこそ';
  document.getElementById('greet').textContent=n;
}

// ================= 個別化メモ =================
function activeFlags(){ return (PROFILE && PROFILE.flags) ? PROFILE.flags : []; }
function boostKeywordsForUser(){
  const set=new Set();
  activeFlags().forEach(function(f){ (FLAG_BOOST[f]||[]).forEach(function(k){ set.add(k); }); });
  return set;
}
function renderPersonalTip(){
  const tips=activeFlags().map(function(f){ return FLAG_TIP[f]; }).filter(Boolean);
  const html = tips.length ? ("<strong>あなた向けメモ</strong><ul>"+tips.map(function(t){return "<li>"+t+"</li>";}).join("")+"</ul>") : "";
  const a=document.getElementById('personalTip'); if(a) a.innerHTML=html;
  const b=document.getElementById('tipPanel'); if(b) b.innerHTML=html;
}

// ================= AI相談（個別化つき） =================
function askPseudoAI(){
  const input=document.getElementById('customQuestion').value;
  const res=document.getElementById('questionResult');
  if(input.trim()===''){ res.style.display='block'; res.innerHTML='質問を入力してください。'; return; }
  const words=input.replace(/[はがをにでともの！？?]/g,' ').split(/\s+/).filter(function(w){return w.length>0;});
  const boost=boostKeywordsForUser();
  let best=null,max=0,bestFlagHit=false;
  for(const item of knowledgeBase){
    let s=0;
    for(const kw of item.keywords){ for(const w of words){ if(w.length<2) continue; if(kw.includes(w)||w.includes(kw)) s+=3; } }
    for(const w of words){ if(item.answer.includes(w)&&w.length>1) s+=1; }
    let flagHit=false;
    if(s>0 && boost.size){ for(const kw of item.keywords){ if(boost.has(kw)){ s+=2; flagHit=true; } } }
    if(s>max){ max=s; best=item; bestFlagHit=flagHit; }
  }
  if(best && max>0){
    const note = bestFlagHit ? "<div class='pmatch'>🎯 あなたの登録内容にも関わる項目です</div>" : "";
    res.innerHTML = "<strong>【"+best.source+"からの回答】</strong>"+note+"<br><br>"+best.answer+DISCLAIMER;
    if(PASS && sb){
      sb.rpc('na_add_history',{p:PASS,q:input.slice(0,300),src:best.source}).then(function(){},function(){});
      HISTORY.unshift({question:input.slice(0,300),source:best.source,created_at:new Date().toISOString()});
    }
  }else{
    res.innerHTML = "<strong>【回答】</strong><br><br>該当するデータが見つかりませんでした。短い単語（例：「サプリ」「停滞期」「むくみ」）でお試しください。"+DISCLAIMER;
  }
  res.style.display='block';
}

async function analyze(){
  const nw=parseFloat(document.getElementById('nightWeight').value);
  const mw=parseFloat(document.getElementById('morningWeight').value);
  const res=document.getElementById('analysisResult');
  if(isNaN(nw)||isNaN(mw)){ res.style.display='block'; res.innerHTML='数値を正しく入力してください。'; return; }
  let text="<strong>【記録しました】</strong><br><br>";
  if((nw-mw)<0.5){ text+="夜と朝の体重差が小さめです。就寝中の水分代謝が落ちている可能性があり、マグネシウム・カリウム（ほうれん草・わかめ・バナナ）を意識してみましょう。"; }
  else{ text+="夜と朝の体重差は良好で、水分代謝は問題なさそうです。鉄分・ビタミンB群（豚肉・あさり）でエネルギー代謝を後押ししましょう。"; }
  if(PASS && sb){
    try{ const { error } = await sb.rpc('na_add_log',{p:PASS,night:nw,morning:mw}); if(error) throw error;
      LOGS.unshift({logged_at:new Date().toISOString(),night_kg:nw,morning_kg:mw}); }
    catch(e){ console.error(e); }
  }
  const trend=trendComment();
  if(trend) text += "<br><br>"+trend;
  res.innerHTML=text+DISCLAIMER; res.style.display='block';
  document.getElementById('nightWeight').value=''; document.getElementById('morningWeight').value='';
  renderRecord();
}
function trendComment(){
  const ms=LOGS.filter(function(l){return l.morning_kg!=null;}).map(function(l){return parseFloat(l.morning_kg);});
  if(ms.length<2) return "";
  const diff=ms[0]-ms[1];
  let c="直近の朝体重 "+ms[0].toFixed(1)+"kg（前回比 "+(diff>=0?"+":"")+diff.toFixed(1)+"kg）。";
  const recent=ms.slice(0,5);
  if(recent.length>=4){ const mn=Math.min.apply(null,recent), mx=Math.max.apply(null,recent);
    if(mx-mn<=0.3){ c+=" ここ数回は横ばいです。停滞期のサインかも。1〜2週間“維持カロリー”に戻す『ダイエットブレイク』も選択肢です（「停滞期」で検索してみてください）。"; } }
  return c;
}

// ================= 記録タブ描画 =================
function renderRecord(){
  const wt=document.getElementById('weightTrend');
  const ms=LOGS.filter(function(l){return l.morning_kg!=null;});
  if(!ms.length){ wt.innerHTML="<p class='muted'>まだ記録がありません。「体重を記録」から入力してください。</p>"; }
  else{
    wt.innerHTML = ms.slice(0,12).map(function(l){
      const d=new Date(l.logged_at); const ds=(d.getMonth()+1)+'/'+d.getDate();
      const morning=parseFloat(l.morning_kg).toFixed(1);
      const night=(l.night_kg!=null)?parseFloat(l.night_kg).toFixed(1)+"kg":"-";
      return "<div class='wrow'><span>"+ds+"</span><span>朝 "+morning+"kg</span><span class='m'>夜 "+night+"</span></div>";
    }).join("");
  }
  const hl=document.getElementById('histList');
  if(!HISTORY.length){ hl.innerHTML="<p class='muted'>まだ相談履歴はありません。</p>"; }
  else{
    hl.innerHTML = HISTORY.slice(0,15).map(function(h){
      const d=new Date(h.created_at); const ds=(d.getMonth()+1)+'/'+d.getDate();
      return "<div class='hrow'><div class='q'>"+escp(h.question)+"</div><div class='s'>"+ds+"・"+escp(h.source||'')+"</div></div>";
    }).join("");
  }
}

// ================= タブ切替 =================
function openTab(evt,name){ openTabByName(name); }
function openTabByName(name){
  document.querySelectorAll('.content').forEach(function(c){ c.style.display='none'; c.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  const el=document.getElementById(name); el.style.display='block'; el.classList.add('active');
  const tab=document.querySelector('.tab[data-tab="'+name+'"]'); if(tab) tab.classList.add('active');
  if(name==='record'){ renderRecord(); renderPersonalTip(); }
  if(name==='ai'){ renderPersonalTip(); }
}

window.addEventListener('DOMContentLoaded', function(){
  const p=safeLSget('na_pass');
  if(p){ document.getElementById('loginPass').value=p; doLogin(); }
});
